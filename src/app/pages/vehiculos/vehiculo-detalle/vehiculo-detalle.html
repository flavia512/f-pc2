<div class="container py-4">

  <!-- Botón volver -->
  <div class="mb-4">
    <a routerLink="/vehiculos" class="btn btn-outline-secondary btn-sm">
      ← Volver
    </a>
  </div>

  <div class="row g-3">

    <!--  Imagen (33.3%) -->
    <div class="col-12 col-md-4 d-flex align-items-center justify-content-center">
      <img
        [src]="imagenUrl"
        alt="Imagen del vehículo"
        class="img-fluid"
        style="max-width: 60%;"
      />
    </div>

    <!-- COLUMNA 2 (50%) -->
    <div class="col-12 col-md-6 p-3">
      <h2 class="fw-bold">{{ modelo }}</h2>
      <p class="text-muted fs-5">
        <span class="fw-semibold">Matrícula:</span> {{ matricula }}
      </p>
      <p class="text-muted fs-5">
        <span class="fw-semibold">ID Vehículo:</span> {{ id }}
      </p>
      <p class="text-muted fs-5">
        <span class="fw-semibold">Usuario:</span> {{ userId }}
      </p>
    </div>

    <!-- COLUMNA 3 (16.6%) -->
    <div class="col-12 col-md-2 p-3 bg-primary text-white rounded d-flex flex-column align-items-center justify-content-center">
      <p class="mb-1 fw-semibold fs-6 text-uppercase">Plazas disponibles</p>
      <span class="display-4 fw-bold">{{ plazas }}</span>
    </div>

  </div>
</div>
