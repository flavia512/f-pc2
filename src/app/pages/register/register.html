<div class="container register-page">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6 mx-auto">

      <div class="register-header">
        <div class="logo-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-2-2.2-3.5C13 5.5 12 5 11 5H5c-1.1 0-2.1.6-2.7 1.4L1 8v8c0 .6.4 1 1 1h1"/>
            <circle cx="7" cy="17" r="2"/>
            <circle cx="17" cy="17" r="2"/>
          </svg>
        </div>
        <h1>Crear Cuenta</h1>
        <p class="subtitle">Únete a VoyContigo</p>
      </div>

      <div class="register-card card shadow p-4">
        <form [formGroup]="form" (ngSubmit)="onSubmit()">
          <div class="mb-3">
            <label class="form-label">Nombre Completo</label>
            <div class="input-group">
              <span class="input-group-text">
                <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/>
                  <circle cx="12" cy="7" r="4"/>
                </svg>
              </span>
              <input type="text" formControlName="full_name" placeholder="Tu nombre completo" class="form-control">
            </div>
            <div *ngIf="form.get('full_name')?.touched && form.get('full_name')?.hasError('required')" class="text-danger small mt-1">El nombre es obligatorio</div>
          </div>

          <div class="mb-3">
            <label class="form-label">Correo Electrónico</label>
            <div class="input-group">
              <span class="input-group-text">
                <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect width="20" height="16" x="2" y="4" rx="2"/>
                  <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
                </svg>
              </span>
              <input type="email" formControlName="email" placeholder="tu@email.com" class="form-control">
            </div>
            <div *ngIf="form.get('email')?.touched && form.get('email')?.hasError('required')" class="text-danger small mt-1">El correo es obligatorio</div>
            <div *ngIf="form.get('email')?.touched && form.get('email')?.hasError('email')" class="text-danger small mt-1">Ingresa un correo válido</div>
          </div>

          <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <div class="input-group">
              <span class="input-group-text">
                <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
              </span>
              <input type="password" formControlName="password" placeholder="Mínimo 6 caracteres" class="form-control">
            </div>
            <div *ngIf="form.get('password')?.touched && form.get('password')?.hasError('required')" class="text-danger small mt-1">La contraseña es obligatoria</div>
            <div *ngIf="form.get('password')?.touched && form.get('password')?.hasError('minlength')" class="text-danger small mt-1">Mínimo 6 caracteres</div>
          </div>

          <div class="mb-3">
            <label class="form-label">Confirmar Contraseña</label>
            <div class="input-group">
              <span class="input-group-text">
                <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
              </span>
              <input type="password" formControlName="password_confirmation" placeholder="Repite tu contraseña" class="form-control">
            </div>
            <div *ngIf="form.get('password_confirmation')?.touched && form.get('password_confirmation')?.hasError('required')" class="text-danger small mt-1">La confirmación es obligatoria</div>
            <div *ngIf="form.get('password_confirmation')?.touched && form.get('password_confirmation')?.value !== form.get('password')?.value" class="text-danger small mt-1">Las contraseñas no coinciden</div>
          </div>
          <div *ngIf="successMessage()" class="alert alert-success">{{ successMessage() }}</div>
          <div *ngIf="errorMessage()" class="alert alert-danger">{{ errorMessage() }}</div>

          <button type="submit" class="btn btn-primary w-100" [disabled]="loading()">
            {{ loading() ? 'Registrando...' : 'Crear Cuenta' }}
          </button>
        </form>

        <p class="login-link mt-3 text-center">
          ¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a>
        </p>
      </div>

    </div>
  </div>
</div>
